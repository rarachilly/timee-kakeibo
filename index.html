<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイミー家計簿</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #f472b6;
    --pink-light: #fce7f3;
    --pink-pale: #fdf2f8;
    --lavender: #a78bfa;
    --lavender-light: #ede9fe;
    --mint: #34d399;
    --mint-light: #d1fae5;
    --peach: #fb923c;
    --peach-light: #ffedd5;
    --sky: #38bdf8;
    --sky-light: #e0f2fe;
    --text: #3b2a4a;
    --text-muted: #9d8aad;
    --white: #ffffff;
    --surface: #fefcff;
    --border: #f0e6f8;
    --shadow: 0 4px 20px rgba(167,139,250,0.12);
    --shadow-card: 0 2px 12px rgba(167,139,250,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: linear-gradient(135deg, #fdf2f8 0%, #ede9fe 50%, #f0fdf4 100%);
    min-height: 100vh;
    color: var(--text);
  }

  /* ヘッダー */
  .header {
    background: linear-gradient(135deg, var(--pink) 0%, var(--lavender) 100%);
    padding: 20px 16px 14px;
    text-align: center;
    position: relative;
    box-shadow: 0 4px 20px rgba(244,114,182,0.3);
  }

  .header h1 {
    font-family: 'Nunito', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: white;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  .header-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.8);
    margin-top: 2px;
  }

  .export-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.25);
    border: 1.5px solid rgba(255,255,255,0.5);
    border-radius: 50%;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 16px;
    color: white;
    backdrop-filter: blur(4px);
  }

  .export-btn:hover { background: rgba(255,255,255,0.4); transform: translateY(-50%) scale(1.05); }

  /* タブ */
  .tabs {
    display: flex;
    background: var(--white);
    padding: 8px 12px;
    gap: 6px;
    border-bottom: 2px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }

  .tab {
    flex: 1;
    padding: 8px 4px;
    border: none;
    border-radius: 12px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s;
    background: var(--pink-pale);
    color: var(--text-muted);
  }

  .tab.active-earn { background: linear-gradient(135deg, var(--mint), #059669); color: white; box-shadow: 0 3px 12px rgba(52,211,153,0.4); }
  .tab.active-spend { background: linear-gradient(135deg, var(--peach), #ea580c); color: white; box-shadow: 0 3px 12px rgba(251,146,60,0.4); }
  .tab.active-wish { background: linear-gradient(135deg, var(--pink), var(--lavender)); color: white; box-shadow: 0 3px 12px rgba(167,139,250,0.4); }
  .tab.active-sub { background: linear-gradient(135deg, var(--sky), #0284c7); color: white; box-shadow: 0 3px 12px rgba(56,189,248,0.4); }

  /* パネル */
  .panel { display: none; padding: 16px 14px; }
  .panel.active { display: block; }

  /* サマリカード */
  .summary-card {
    border-radius: 18px;
    padding: 18px 20px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .summary-card::before {
    content: '';
    position: absolute;
    right: -20px;
    top: -20px;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
  }

  .summary-card.earn { background: linear-gradient(135deg, #34d399, #059669); }
  .summary-card.spend { background: linear-gradient(135deg, #fb923c, #ea580c); }
  .summary-card.wish { background: linear-gradient(135deg, var(--pink), var(--lavender)); }
  .summary-card.sub { background: linear-gradient(135deg, var(--sky), #0284c7); }

  .summary-label {
    font-size: 11px;
    color: rgba(255,255,255,0.85);
    font-weight: 600;
    margin-bottom: 4px;
  }

  .summary-amount {
    font-family: 'Nunito', sans-serif;
    font-size: 30px;
    font-weight: 800;
    color: white;
    text-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .summary-amount span { font-size: 16px; font-weight: 600; }

  .summary-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.8);
    margin-top: 6px;
  }

  /* 週別サマリ */
  .week-summaries {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 8px;
  }

  .week-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: rgba(255,255,255,0.85);
  }

  /* 追加フォーム */
  .add-form {
    background: white;
    border-radius: 18px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-card);
    border: 1.5px solid var(--border);
  }

  .form-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }

  .form-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .form-group.date { flex: 0 0 118px; }
  .form-group.name { flex: 1 1 100px; }
  .form-group.amount { flex: 0 0 90px; }

  .form-group label {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }

  .form-group input {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 8px 8px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 16px;
    color: var(--text);
    background: var(--pink-pale);
    outline: none;
    transition: border 0.2s;
    width: 100%;
  }

  .form-group.date input {
    font-size: 13px;
    padding: 8px 4px;
  }

  .form-group input:focus { border-color: var(--lavender); background: white; }

  .add-btn {
    margin-top: 12px;
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 12px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    color: white;
  }

  .add-btn.earn { background: linear-gradient(135deg, var(--mint), #059669); }
  .add-btn.spend { background: linear-gradient(135deg, var(--peach), #ea580c); }
  .add-btn.wish { background: linear-gradient(135deg, var(--pink), var(--lavender)); }
  .add-btn.sub { background: linear-gradient(135deg, var(--sky), #0284c7); }
  .add-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.15); }
  .add-btn:active { transform: translateY(0); }

  /* リスト */
  .records-list { display: flex; flex-direction: column; gap: 8px; }

  .record-item {
    background: white;
    border-radius: 14px;
    padding: 12px 14px;
    box-shadow: var(--shadow-card);
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.2s;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .record-item:hover { box-shadow: var(--shadow); }

  .record-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-earn { background: var(--mint); }
  .dot-spend { background: var(--peach); }
  .dot-wish { background: linear-gradient(135deg, var(--pink), var(--lavender)); }
  .dot-sub { background: var(--sky); }

  .record-body { flex: 1; min-width: 0; }

  .record-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .record-date {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .record-amount {
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    flex-shrink: 0;
  }

  .amount-earn { color: #059669; }
  .amount-spend { color: #ea580c; }
  .amount-wish { color: var(--lavender); }
  .amount-sub { color: #0284c7; }

  .record-actions { display: flex; gap: 4px; flex-shrink: 0; }

  .action-btn {
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .edit-btn { background: var(--lavender-light); color: var(--lavender); }
  .edit-btn:hover { background: var(--lavender); color: white; }
  .del-btn { background: #fee2e2; color: #ef4444; }
  .del-btn:hover { background: #ef4444; color: white; }
  .up-btn { background: var(--mint-light); color: #059669; }
  .up-btn:hover { background: var(--mint); color: white; }
  .down-btn { background: var(--peach-light); color: var(--peach); }
  .down-btn:hover { background: var(--peach); color: white; }

  /* 編集メニュー（コピー含む） */
  .edit-menu {
    background: white;
    border-radius: 12px;
    padding: 10px;
    margin-top: 8px;
    border: 1.5px solid var(--border);
    box-shadow: var(--shadow-card);
    display: flex;
    gap: 6px;
  }

  .edit-menu-btn {
    flex: 1;
    padding: 8px 4px;
    border: none;
    border-radius: 8px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .edit-menu-btn .btn-icon { font-size: 14px; }
  .edit-menu-btn.do-edit { background: var(--lavender-light); color: var(--lavender); }
  .edit-menu-btn.do-edit:hover { background: var(--lavender); color: white; }
  .edit-menu-btn.do-copy { background: var(--pink-light); color: var(--pink); }
  .edit-menu-btn.do-copy:hover { background: var(--pink); color: white; }
  .edit-menu-btn.do-cancel { background: var(--border); color: var(--text-muted); }
  .edit-menu-btn.do-cancel:hover { background: #d1c4e9; }

  /* 編集フォーム(インライン) */
  .edit-form {
    background: var(--pink-pale);
    border-radius: 12px;
    padding: 12px;
    margin-top: 8px;
    border: 1.5px solid var(--border);
  }

  .edit-form input {
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 16px;
    width: 100%;
    margin-bottom: 6px;
    outline: none;
    background: white;
    color: var(--text);
  }

  .edit-form input:focus { border-color: var(--lavender); }

  .edit-actions { display: flex; gap: 6px; }

  .save-btn, .cancel-btn, .copy-inline-btn {
    flex: 1;
    padding: 7px;
    border: none;
    border-radius: 8px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }

  .save-btn { background: var(--lavender); color: white; }
  .save-btn:hover { background: #7c3aed; }
  .copy-inline-btn { background: var(--pink-light); color: var(--pink); }
  .copy-inline-btn:hover { background: var(--pink); color: white; }
  .cancel-btn { background: var(--border); color: var(--text-muted); }
  .cancel-btn:hover { background: #d1c4e9; }

  /* 空状態 */
  .empty-state {
    text-align: center;
    padding: 32px 16px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .empty-icon { font-size: 36px; margin-bottom: 8px; }

  /* モーダル（エクスポート/インポート） */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(60,40,80,0.35);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: white;
    border-radius: 24px;
    padding: 24px;
    max-width: 340px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(100,60,150,0.2);
    animation: modalIn 0.25s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.92) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal h3 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .modal-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 18px;
  }

  .modal-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 8px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .modal-btn.export { background: linear-gradient(135deg, var(--pink), var(--lavender)); color: white; }
  .modal-btn.export:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(167,139,250,0.4); }
  .modal-btn.import { background: var(--lavender-light); color: var(--lavender); }
  .modal-btn.import:hover { background: var(--lavender); color: white; }
  .modal-btn.close { background: var(--border); color: var(--text-muted); margin-bottom: 0; }
  .modal-btn.close:hover { background: #d1c4e9; }

  #importFileInput { display: none; }

  /* 月ナビ */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .month-nav-btn {
    width: 30px;
    height: 30px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: white;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .month-nav-btn:hover { background: var(--lavender); color: white; border-color: var(--lavender); }

  .month-label {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 16px;
    color: var(--text);
    min-width: 80px;
    text-align: center;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.8px;
    margin-bottom: 8px;
    padding-left: 4px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>タイミー家計簿</h1>
  <div class="header-sub">がんばった分を記録しよう</div>
  <button class="export-btn" onclick="openModal()" title="エクスポート/インポート">⬆︎</button>
</div>

<div class="tabs">
  <button class="tab active-earn" onclick="switchTab('earn')">💼 働いた</button>
  <button class="tab" onclick="switchTab('spend')">🛍 使った</button>
  <button class="tab" onclick="switchTab('wish')">✨ 欲しい</button>
  <button class="tab" onclick="switchTab('sub')">📱 サブスク</button>
</div>

<!-- 働いたタブ -->
<div class="panel active" id="panel-earn">
  <div class="month-nav">
    <button class="month-nav-btn" onclick="changeMonth('earn', -1)">‹</button>
    <div class="month-label" id="month-earn"></div>
    <button class="month-nav-btn" onclick="changeMonth('earn', 1)">›</button>
  </div>
  <div class="summary-card earn">
    <div class="summary-label">今月の収入合計</div>
    <div class="summary-amount" id="earn-total"><span>¥</span>0</div>
  </div>
  <div class="add-form">
    <div class="form-title">+ 新しく記録する</div>
    <div class="form-row">
      <div class="form-group date">
        <label>日付</label>
        <input type="date" id="earn-date">
      </div>
      <div class="form-group name">
        <label>お仕事の名前</label>
        <input type="text" id="earn-name" placeholder="例：倉庫作業">
      </div>
      <div class="form-group amount">
        <label>金額（円）</label>
        <input type="number" id="earn-amount" placeholder="5000">
      </div>
    </div>
    <button class="add-btn earn" onclick="addRecord('earn')">追加する</button>
  </div>
  <div class="section-title">記録一覧</div>
  <div class="records-list" id="earn-list"></div>
</div>

<!-- 使ったタブ -->
<div class="panel" id="panel-spend">
  <div class="month-nav">
    <button class="month-nav-btn" onclick="changeMonth('spend', -1)">‹</button>
    <div class="month-label" id="month-spend"></div>
    <button class="month-nav-btn" onclick="changeMonth('spend', 1)">›</button>
  </div>
  <div class="summary-card spend">
    <div class="summary-label">今月の支出合計</div>
    <div class="summary-amount" id="spend-total-main"><span>¥</span>0</div>
    <div class="summary-sub" id="spend-month-sub"></div>
    <div class="week-summaries" id="spend-week-rows"></div>
  </div>
  <div class="add-form">
    <div class="form-title">+ 新しく記録する</div>
    <div class="form-row">
      <div class="form-group date">
        <label>日付</label>
        <input type="date" id="spend-date">
      </div>
      <div class="form-group name">
        <label>何に使った？</label>
        <input type="text" id="spend-name" placeholder="例：ランチ">
      </div>
      <div class="form-group amount">
        <label>金額（円）</label>
        <input type="number" id="spend-amount" placeholder="800">
      </div>
    </div>
    <button class="add-btn spend" onclick="addRecord('spend')">追加する</button>
  </div>
  <div class="section-title">記録一覧</div>
  <div class="records-list" id="spend-list"></div>
</div>

<!-- 欲しいタブ -->
<div class="panel" id="panel-wish">
  <div class="summary-card wish">
    <div class="summary-label">欲しいものの合計金額</div>
    <div class="summary-amount" id="wish-total"><span>¥</span>0</div>
  </div>
  <div class="add-form">
    <div class="form-title">+ 欲しいものを追加</div>
    <div class="form-row">
      <div class="form-group name" style="flex:1 1 150px;">
        <label>欲しいもの</label>
        <input type="text" id="wish-name" placeholder="例：新しいイヤホン">
      </div>
      <div class="form-group amount">
        <label>金額（円）</label>
        <input type="number" id="wish-amount" placeholder="8000">
      </div>
    </div>
    <button class="add-btn wish" onclick="addRecord('wish')">追加する</button>
  </div>
  <div class="section-title">欲しいものリスト（優先順に並べてね）</div>
  <div class="records-list" id="wish-list"></div>
</div>

<!-- サブスクタブ -->
<div class="panel" id="panel-sub">
  <div class="summary-card sub">
    <div class="summary-label">サブスク月額合計</div>
    <div class="summary-amount" id="sub-total"><span>¥</span>0</div>
  </div>
  <div class="add-form">
    <div class="form-title">+ サブスクを追加</div>
    <div class="form-row">
      <div class="form-group date">
        <label>引き落とし日</label>
        <input type="number" id="sub-day" placeholder="例：15" min="1" max="31">
      </div>
      <div class="form-group name">
        <label>サービス名</label>
        <input type="text" id="sub-name" placeholder="例：Spotify">
      </div>
      <div class="form-group amount">
        <label>金額（円）</label>
        <input type="number" id="sub-amount" placeholder="980">
      </div>
    </div>
    <button class="add-btn sub" onclick="addRecord('sub')">追加する</button>
  </div>
  <div class="section-title">サブスク一覧</div>
  <div class="records-list" id="sub-list"></div>
</div>

<!-- モーダル -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>データの管理</h3>
    <div class="modal-sub">エクスポートでバックアップ、インポートで復元できるよ</div>
    <button class="modal-btn export" onclick="exportData()">⬆ JSONでエクスポート</button>
    <button class="modal-btn import" onclick="document.getElementById('importFileInput').click()">⬇ JSONをインポート</button>
    <input type="file" id="importFileInput" accept=".json" onchange="importData(event)">
    <button class="modal-btn close" onclick="closeModal()">とじる</button>
  </div>
</div>

<script>
// データ
let data = {
  earn: [],
  spend: [],
  wish: [],
  sub: []
};

// 表示中の月 (YYYY-MM)
let currentMonth = {
  earn: getYearMonth(new Date()),
  spend: getYearMonth(new Date())
};

function getYearMonth(date) {
  return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0');
}

// ローカルストレージ
function saveData() {
  localStorage.setItem('timee-kakeibo', JSON.stringify(data));
}

function loadData() {
  const saved = localStorage.getItem('timee-kakeibo');
  if (saved) {
    try { data = JSON.parse(saved); } catch(e) {}
  }
}

// 初期化
function init() {
  loadData();
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('earn-date').value = today;
  document.getElementById('spend-date').value = today;
  updateAllViews();
}

// タブ切り替え
function switchTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => { t.className = 'tab'; });
  document.getElementById('panel-' + tab).classList.add('active');
  const tabBtns = document.querySelectorAll('.tab');
  const idx = { earn: 0, spend: 1, wish: 2, sub: 3 };
  tabBtns[idx[tab]].classList.add('active-' + tab);
}

// 月ナビ
function changeMonth(type, delta) {
  const [y, m] = currentMonth[type].split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  currentMonth[type] = getYearMonth(d);
  updateView(type);
}

function formatMonthLabel(ym) {
  const [y, m] = ym.split('-');
  return y + '年' + parseInt(m) + '月';
}

// レコード追加
function addRecord(type) {
  if (type === 'earn') {
    const date = document.getElementById('earn-date').value;
    const name = document.getElementById('earn-name').value.trim();
    const amount = parseInt(document.getElementById('earn-amount').value);
    if (!date || !name || isNaN(amount) || amount <= 0) { alert('全部入力してね！'); return; }
    data.earn.push({ id: Date.now(), date, name, amount });
    document.getElementById('earn-name').value = '';
    document.getElementById('earn-amount').value = '';
  } else if (type === 'spend') {
    const date = document.getElementById('spend-date').value;
    const name = document.getElementById('spend-name').value.trim();
    const amount = parseInt(document.getElementById('spend-amount').value);
    if (!date || !name || isNaN(amount) || amount <= 0) { alert('全部入力してね！'); return; }
    data.spend.push({ id: Date.now(), date, name, amount });
    document.getElementById('spend-name').value = '';
    document.getElementById('spend-amount').value = '';
  } else if (type === 'wish') {
    const name = document.getElementById('wish-name').value.trim();
    const amount = parseInt(document.getElementById('wish-amount').value);
    if (!name || isNaN(amount) || amount <= 0) { alert('名前と金額を入れてね！'); return; }
    data.wish.push({ id: Date.now(), name, amount });
    document.getElementById('wish-name').value = '';
    document.getElementById('wish-amount').value = '';
  } else if (type === 'sub') {
    const day = parseInt(document.getElementById('sub-day').value);
    const name = document.getElementById('sub-name').value.trim();
    const amount = parseInt(document.getElementById('sub-amount').value);
    if (isNaN(day) || day < 1 || day > 31 || !name || isNaN(amount) || amount <= 0) { alert('全部正しく入力してね！'); return; }
    data.sub.push({ id: Date.now(), day, name, amount });
    document.getElementById('sub-day').value = '';
    document.getElementById('sub-name').value = '';
    document.getElementById('sub-amount').value = '';
  }
  saveData();
  updateAllViews();
}

// 削除
function deleteRecord(type, id) {
  if (!confirm('削除していい？')) return;
  data[type] = data[type].filter(r => r.id !== id);
  saveData();
  updateAllViews();
}

// 編集フォーム表示（✏ボタンで直接開く）
function showEdit(type, id) {
  document.querySelectorAll('.edit-form, .edit-menu').forEach(f => f.remove());
  const item = data[type].find(r => r.id === id);
  if (!item) return;
  const itemEl = document.querySelector(`[data-id="${id}"]`);
  const form = document.createElement('div');
  form.className = 'edit-form';
  if (type === 'earn') {
    form.innerHTML = `
      <input type="date" id="edit-date-${id}" value="${item.date}">
      <input type="text" id="edit-name-${id}" value="${item.name}" placeholder="名前">
      <input type="number" id="edit-amount-${id}" value="${item.amount}" placeholder="金額">
      <div class="edit-actions">
        <button class="save-btn" onclick="saveEdit('${type}', ${id})">保存</button>
        <button class="copy-inline-btn" onclick="copyRecord('earn', ${id})">📋 コピー</button>
        <button class="cancel-btn" onclick="cancelEdit()">キャンセル</button>
      </div>
    `;
  } else if (type === 'spend') {
    form.innerHTML = `
      <input type="date" id="edit-date-${id}" value="${item.date}">
      <input type="text" id="edit-name-${id}" value="${item.name}" placeholder="名前">
      <input type="number" id="edit-amount-${id}" value="${item.amount}" placeholder="金額">
      <div class="edit-actions">
        <button class="save-btn" onclick="saveEdit('${type}', ${id})">保存</button>
        <button class="cancel-btn" onclick="cancelEdit()">キャンセル</button>
      </div>
    `;
  } else if (type === 'sub') {
    form.innerHTML = `
      <input type="number" id="edit-day-${id}" value="${item.day}" placeholder="日にち" min="1" max="31">
      <input type="text" id="edit-name-${id}" value="${item.name}" placeholder="サービス名">
      <input type="number" id="edit-amount-${id}" value="${item.amount}" placeholder="金額">
      <div class="edit-actions">
        <button class="save-btn" onclick="saveEdit('sub', ${id})">保存</button>
        <button class="cancel-btn" onclick="cancelEdit()">キャンセル</button>
      </div>
    `;
  } else {
    form.innerHTML = `
      <input type="text" id="edit-name-${id}" value="${item.name}" placeholder="名前">
      <input type="number" id="edit-amount-${id}" value="${item.amount}" placeholder="金額">
      <div class="edit-actions">
        <button class="save-btn" onclick="saveEdit('${type}', ${id})">保存</button>
        <button class="cancel-btn" onclick="cancelEdit()">キャンセル</button>
      </div>
    `;
  }
  itemEl.insertAdjacentElement('afterend', form);
}

function cancelEdit() {
  document.querySelectorAll('.edit-form, .edit-menu').forEach(f => f.remove());
}

function saveEdit(type, id) {
  const item = data[type].find(r => r.id === id);
  if (!item) return;
  const name = document.getElementById(`edit-name-${id}`).value.trim();
  const amount = parseInt(document.getElementById(`edit-amount-${id}`).value);
  if (!name || isNaN(amount) || amount <= 0) { alert('正しく入力してね！'); return; }
  item.name = name;
  item.amount = amount;
  if (type === 'earn' || type === 'spend') {
    item.date = document.getElementById(`edit-date-${id}`).value;
  }
  if (type === 'sub') {
    const day = parseInt(document.getElementById(`edit-day-${id}`).value);
    if (isNaN(day) || day < 1 || day > 31) { alert('日にちを正しく入れてね！'); return; }
    item.day = day;
  }
  saveData();
  updateAllViews();
}

// コピー（働いたタブ専用）
function copyRecord(type, id) {
  const item = data[type].find(r => r.id === id);
  if (!item) return;
  const today = new Date().toISOString().split('T')[0];
  data[type].push({ id: Date.now(), date: today, name: item.name, amount: item.amount });
  cancelEdit();
  saveData();
  updateAllViews();
}

// 並び替え（欲しいもの）
function moveWish(id, dir) {
  const idx = data.wish.findIndex(r => r.id === id);
  if (dir === 'up' && idx > 0) {
    [data.wish[idx], data.wish[idx - 1]] = [data.wish[idx - 1], data.wish[idx]];
  } else if (dir === 'down' && idx < data.wish.length - 1) {
    [data.wish[idx], data.wish[idx + 1]] = [data.wish[idx + 1], data.wish[idx]];
  }
  saveData();
  updateView('wish');
}

// 週計算（1〜7日、8〜14日、15〜21日、22〜末日）
function getWeekLabel(day) {
  if (day <= 7) return '1週目（1〜7日）';
  if (day <= 14) return '2週目（8〜14日）';
  if (day <= 21) return '3週目（15〜21日）';
  return '4週目（22日〜）';
}

function getWeekKey(day) {
  if (day <= 7) return 1;
  if (day <= 14) return 2;
  if (day <= 21) return 3;
  return 4;
}

// 金額フォーマット
function fmtAmount(n) {
  return '¥' + n.toLocaleString();
}

// ビュー更新
function updateAllViews() {
  updateView('earn');
  updateView('spend');
  updateView('wish');
  updateView('sub');
}

function updateView(type) {
  if (type === 'earn') renderEarn();
  else if (type === 'spend') renderSpend();
  else if (type === 'wish') renderWish();
  else if (type === 'sub') renderSub();
}

function renderEarn() {
  const ym = currentMonth.earn;
  document.getElementById('month-earn').textContent = formatMonthLabel(ym);
  const records = data.earn.filter(r => r.date && r.date.startsWith(ym));
  records.sort((a, b) => b.date.localeCompare(a.date));
  const total = records.reduce((s, r) => s + r.amount, 0);
  document.getElementById('earn-total').innerHTML = `<span>¥</span>${total.toLocaleString()}`;
  const list = document.getElementById('earn-list');
  if (records.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">💼</div>まだ記録がないよ！</div>`;
    return;
  }
  list.innerHTML = records.map(r => `
    <div class="record-item" data-id="${r.id}">
      <div class="record-dot dot-earn"></div>
      <div class="record-body">
        <div class="record-name">${escHtml(r.name)}</div>
        <div class="record-date">${r.date}</div>
      </div>
      <div class="record-amount amount-earn">${fmtAmount(r.amount)}</div>
      <div class="record-actions">
        <button class="action-btn edit-btn" onclick="showEdit('earn', ${r.id})">✏</button>
        <button class="action-btn del-btn" onclick="deleteRecord('earn', ${r.id})">✕</button>
      </div>
    </div>
  `).join('');
}

function renderSpend() {
  const ym = currentMonth.spend;
  document.getElementById('month-spend').textContent = formatMonthLabel(ym);
  const records = data.spend.filter(r => r.date && r.date.startsWith(ym));
  records.sort((a, b) => b.date.localeCompare(a.date));
  const total = records.reduce((s, r) => s + r.amount, 0);
  document.getElementById('spend-total-main').innerHTML = `<span>¥</span>${total.toLocaleString()}`;

  // 週別集計
  const weeks = {1:0, 2:0, 3:0, 4:0};
  records.forEach(r => {
    const day = parseInt(r.date.split('-')[2]);
    weeks[getWeekKey(day)] += r.amount;
  });
  const weekRows = document.getElementById('spend-week-rows');
  weekRows.innerHTML = [1,2,3,4].filter(w => weeks[w] > 0).map(w => `
    <div class="week-row">
      <span>${getWeekLabel(w === 1 ? 1 : w === 2 ? 8 : w === 3 ? 15 : 22)}</span>
      <span>${fmtAmount(weeks[w])}</span>
    </div>
  `).join('');

  const list = document.getElementById('spend-list');
  if (records.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🛍</div>まだ記録がないよ！</div>`;
    return;
  }
  list.innerHTML = records.map(r => `
    <div class="record-item" data-id="${r.id}">
      <div class="record-dot dot-spend"></div>
      <div class="record-body">
        <div class="record-name">${escHtml(r.name)}</div>
        <div class="record-date">${r.date}</div>
      </div>
      <div class="record-amount amount-spend">${fmtAmount(r.amount)}</div>
      <div class="record-actions">
        <button class="action-btn edit-btn" onclick="showEdit('spend', ${r.id})">✏</button>
        <button class="action-btn del-btn" onclick="deleteRecord('spend', ${r.id})">✕</button>
      </div>
    </div>
  `).join('');
}

function renderWish() {
  const total = data.wish.reduce((s, r) => s + r.amount, 0);
  document.getElementById('wish-total').innerHTML = `<span>¥</span>${total.toLocaleString()}`;
  const list = document.getElementById('wish-list');
  if (data.wish.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">✨</div>欲しいもの、追加してみて！</div>`;
    return;
  }
  list.innerHTML = data.wish.map((r, idx) => `
    <div class="record-item" data-id="${r.id}">
      <div class="record-dot dot-wish"></div>
      <div class="record-body">
        <div class="record-name">${escHtml(r.name)}</div>
        <div class="record-date">優先度 ${idx + 1}位</div>
      </div>
      <div class="record-amount amount-wish">${fmtAmount(r.amount)}</div>
      <div class="record-actions">
        <button class="action-btn up-btn" onclick="moveWish(${r.id}, 'up')" ${idx === 0 ? 'disabled style="opacity:0.3"' : ''}>↑</button>
        <button class="action-btn down-btn" onclick="moveWish(${r.id}, 'down')" ${idx === data.wish.length - 1 ? 'disabled style="opacity:0.3"' : ''}>↓</button>
        <button class="action-btn edit-btn" onclick="showEdit('wish', ${r.id})">✏</button>
        <button class="action-btn del-btn" onclick="deleteRecord('wish', ${r.id})">✕</button>
      </div>
    </div>
  `).join('');
}

function renderSub() {
  const records = [...data.sub].sort((a, b) => a.day - b.day);
  const total = records.reduce((s, r) => s + r.amount, 0);
  document.getElementById('sub-total').innerHTML = `<span>¥</span>${total.toLocaleString()}`;
  const list = document.getElementById('sub-list');
  if (records.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📱</div>サブスクを追加してみて！</div>`;
    return;
  }
  list.innerHTML = records.map(r => `
    <div class="record-item" data-id="${r.id}">
      <div class="record-dot dot-sub"></div>
      <div class="record-body">
        <div class="record-name">${escHtml(r.name)}</div>
        <div class="record-date">毎月 ${r.day}日</div>
      </div>
      <div class="record-amount amount-sub">${fmtAmount(r.amount)}</div>
      <div class="record-actions">
        <button class="action-btn edit-btn" onclick="showEdit('sub', ${r.id})">✏</button>
        <button class="action-btn del-btn" onclick="deleteRecord('sub', ${r.id})">✕</button>
      </div>
    </div>
  `).join('');
}

// エスケープ
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// モーダル
function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// エクスポート
function exportData() {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const now = new Date();
  a.download = `timee-kakeibo-${getYearMonth(now)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  closeModal();
}

// インポート
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.earn || !imported.spend || !imported.wish) {
        alert('ファイルの形式が違うみたい！');
        return;
      }
      if (!imported.sub) imported.sub = []; // 古いファイルの互換対応
      if (confirm('今のデータと置き換えていい？')) {
        data = imported;
        saveData();
        updateAllViews();
        closeModal();
        alert('インポートできたよ！');
      }
    } catch(err) {
      alert('読み込みに失敗しちゃった。JSONファイルか確認してね。');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// 起動
init();
</script>
</body>
</html>
